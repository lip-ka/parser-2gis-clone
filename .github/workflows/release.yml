name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (for example v1.2.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            dist: linux

          - os: macos-latest
            dist: macos
            ext:

          - os: macos-14
            dist: macos-arm
            ext:

          - os: windows-latest
            dist: windows

    runs-on: ${{ matrix.os }}

    steps:
    - name: Get the version
      id: get_version
      run: |
        ref="${GITHUB_REF#refs/tags/}"
        if [ -n "${{ github.event.inputs.tag }}" ]; then
          ref="${{ github.event.inputs.tag }}"
        fi
        echo "version=$ref" >> $GITHUB_OUTPUT
      shell: bash

    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11.3"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .[gui,dev]
        # Replace pydantic with no-binary version to lightweight target binary a bit
        # python -m pip uninstall -y pydantic
        # python -m pip install --no-binary pydantic pydantic>=1.9.0

    - name: Build standalone app
      run: |
        python setup.py build_standalone

    - name: Archive Windows distributive
      if: matrix.dist == 'windows'
      run: pushd dist && 7z a ../Parser2GIS-${{steps.get_version.outputs.version}}-${{matrix.dist}}.zip  Parser2GIS.exe && popd
      shell: bash

    - name: Archive Linux/MacOS distributive
      if: matrix.dist != 'windows'
      run: tar -C dist/ -czvf Parser2GIS-${{steps.get_version.outputs.version}}-${{matrix.dist}}.tar.gz Parser2GIS
      shell: bash

    - name: Upload distributive
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.dist }}
        path: Parser2GIS-*
        retention-days: 5

  release:
    name: Release

    needs: [build]

    runs-on: ubuntu-latest

    steps:
    - name: Get the version
      id: get_version
      run: |
        ref="${GITHUB_REF#refs/tags/v}"
        input_tag="${{ github.event.inputs.tag }}"
        if [ -n "$input_tag" ]; then
          ref="${input_tag#v}"
        fi
        echo "version=$ref" >> $GITHUB_OUTPUT
      shell: bash

    - uses: actions/checkout@v4

    - name: Get Changelog Entry
      id: changelog_reader
      uses: mindsers/changelog-reader-action@v2
      with:
        version: ${{ steps.get_version.outputs.version }}
        path: ./CHANGELOG.md

    - uses: actions/download-artifact@v4

    - uses: ncipollo/release-action@v1.10.0
      with:
        tag: v${{ steps.changelog_reader.outputs.version }}
        name: Parser2GIS ${{ steps.changelog_reader.outputs.version }}
        body: ${{ steps.changelog_reader.outputs.changes }}
        prerelease: ${{ steps.changelog_reader.outputs.status == 'prereleased' }}
        draft: false
        artifacts: "dist-*/*"
        allowUpdates: true
        makeLatest: true
        artifactErrorsFailBuild: true
        token: ${{ secrets.GITHUB_TOKEN }}
